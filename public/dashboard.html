<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SoulLift Dashboard</title>
  <style>
    * { box-sizing: border-box; transition: all .3s; }
    body { 
      font-family: "Segoe UI", Roboto, sans-serif; 
      margin: 0; 
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; 
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    :root {
      --bg: linear-gradient(135deg,#89f7fe,#66a6ff);
      --card: #fff;
      --text: #333;
      --btn1: #6a11cb;
      --btn2: #2575fc;
      --code-bg: #222;
      --code-text: #0f0;
    }
    body.dark {
      --bg: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      --card: #1e1e1e;
      --text: #eee;
      --btn1: #ff512f;
      --btn2: #dd2476;
      --code-bg: #111;
      --code-text: #0f0;
    }
    h1 {
      text-shadow: 1px 1px 4px rgba(0,0,0,.3);
      margin-bottom: 20px;
    }
    .theme-toggle {
      position: absolute; top:20px; right:20px;
      background: var(--card);
      border:none; padding:10px 15px;
      border-radius: 20px; cursor: pointer;
      font-weight: bold; color: var(--text);
      box-shadow: 0 3px 8px rgba(0,0,0,.2);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
      gap: 20px;
      width: 100%;
      max-width: 1200px;
    }
    .card {
      background: var(--card);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    h2 { font-size: 1.2rem; margin-top: 0; }
    button {
      padding: 8px 14px;
      margin: 5px 5px 5px 0;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg,var(--btn1),var(--btn2));
      color: white;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    input {
      padding: 8px; 
      margin: 5px 0;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: var(--card);
      color: var(--text);
    }
    pre {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 15px;
      border-radius: 10px;
      max-height: 300px;
      overflow:auto;
      width: 100%;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark / ☀️ Light</button>
  <h1>🌟 SoulLift Dashboard</h1>

  <div class="grid">
    <div class="card">
      <h2>🔑 Auth</h2>
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="register()">Register</button>
      <button onclick="login()">Login</button>
      <button onclick="refresh()">Refresh Token</button>
    </div>

    <div class="card">
      <h2>💬 Quotes</h2>
      <input id="lang" placeholder="Lang (EN/RO/...)" />
      <button onclick="getQuote()">Random Quote</button>
      <button onclick="searchQuotes()">Search</button>
    </div>

    <div class="card">
      <h2>⭐ Favorites & Playlists</h2>
      <input id="favText" placeholder="Favorite text" />
      <input id="favNote" placeholder="Note (optional)" />
      <button onclick="addFavorite()">Add Favorite</button>
      <button onclick="listFavorites()">List Favorites</button>
      <input id="playlistName" placeholder="Playlist name" />
      <button onclick="createPlaylist()">Create Playlist</button>
      <button onclick="listPlaylists()">List Playlists</button>
    </div>

    <div class="card">
      <h2>🎭 Mood & Badges</h2>
      <input id="mood" placeholder="Mood (focus/calm/boost)" />
      <button onclick="setMood()">Set Mood</button>
      <button onclick="getMood()">Get Mood</button>
      <button onclick="getBadges()">Get Badges</button>
    </div>

    <div class="card">
      <h2>💎 Subscription</h2>
      <button onclick="getSubscription()">Get Subscription</button>
      <button onclick="verifyPurchase()">Verify Purchase</button>
    </div>

    <div class="card">
      <h2>⚙️ Extras</h2>
      <button onclick="getCategories()">Categories</button>
      <button onclick="getLanguages()">Languages</button>
      <button onclick="getStats()">Stats</button>
      <button onclick="exportData()">Export Data</button>
      <button onclick="deleteAccount()">Delete Account</button>
    </div>

    <div class="card" style="grid-column:1/-1">
      <h2>📊 Response</h2>
      <pre id="output"></pre>
    </div>
  </div>

<script>
const base = window.location.origin;
let token = null, refreshTokenVal = null;

function toggleTheme(){ document.body.classList.toggle("dark"); }
function out(data){ document.getElementById("output").textContent = JSON.stringify(data,null,2); }
async function api(path, method="GET", body=null, auth=true){
  const opts = { method, headers:{ "Content-Type":"application/json" }};
  if(body) opts.body = JSON.stringify(body);
  if(auth && token) opts.headers["Authorization"] = "Bearer "+token;
  const res = await fetch(base+path, opts);
  return res.json();
}

// Auth
async function register(){ out(await api("/api/register","POST",{ email:email.value,password:password.value },false)); }
async function login(){ let d=await api("/api/login","POST",{ email:email.value,password:password.value },false); if(d.token){token=d.token;refreshTokenVal=d.refresh;} out(d); }
async function refresh(){ let d=await api("/api/refresh","POST",{ refresh:refreshTokenVal },false); if(d.token) token=d.token; out(d); }

// Quotes
async function getQuote(){ out(await api("/api/quote?lang="+(lang.value||"EN"))); }
async function searchQuotes(){ out(await api("/api/search?q="+lang.value)); }

// Favorites
async function addFavorite(){ out(await api("/api/favorites","POST",{ text:favText.value, note:favNote.value })); }
async function listFavorites(){ out(await api("/api/favorites")); }

// Playlists
async function createPlaylist(){ out(await api("/api/playlists","POST",{ name:playlistName.value })); }
async function listPlaylists(){ out(await api("/api/playlists")); }

// Mood & Badges
async function setMood(){ out(await api("/api/mood","POST",{ mood:mood.value })); }
async function getMood(){ out(await api("/api/mood")); }
async function getBadges(){ out(await api("/api/badges")); }

// Subscription
async function getSubscription(){ out(await api("/api/subscription")); }
async function verifyPurchase(){ out(await api("/api/verify-purchase","POST",{ productId:"premium1", purchaseToken:"TEST123"})); }

// Extras
async function getCategories(){ out(await api("/api/categories")); }
async function getLanguages(){ out(await api("/api/languages")); }
async function getStats(){ out(await api("/api/stats")); }
async function exportData(){ out(await api("/api/privacy/export")); }
async function deleteAccount(){ out(await api("/api/privacy/delete","POST")); }
</script>
</body>
</html>
